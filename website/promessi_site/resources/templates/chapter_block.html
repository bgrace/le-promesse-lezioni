<details class="chapter-block"$open_attr>
  <summary>
    <div>
      <span class="chapter-kicker">Chapter $chapter_number_padded</span>
      <h3>$chapter_label</h3>
    </div>
    <div class="summary-meta">
      <span>$lesson_count lessons</span>
      <div class="pill-row">$artifact_links</div>
    </div>
  </summary>
  <ol>$lesson_rows</ol>
</details>
